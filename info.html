<!DOCTYPE html><!--html ဖိုင်ဖြစ်ကြောင်း web ကို ကြေငြာခြင်း comment ပေးချင်ရင် control + ?-->
<html><!--html code များအားလုံးကို ဒီ အတွင်းမှာထည့်ထည်းရမယ်။ အပိုင်း ၂ ပိုင်းကွဲမယ်။ head နှင့် body-->
    
    <head>
        <title>HTML intro</title>
        <link rel="stylesheet" href="style.css">
    </head><!--head ကတော့ နောက်ကွယ်မှာအလုပ်လုပ်မှာတွေကို ညွှန်ကြားထားတာ။ user ကို တိုက်ရိုက် ပြမပေးဘူး-->
   
    <body>
        <h1>HTML Intro</h1>
        <p>helo</p>

        <!--attritube တွေရေးရင် ရှေ့မှာထားရတယ်။ "" အတွင်း ကြိုက်ရာပေးနိုင်တယ်။-->
        <p align="right">This is p element</p>
        <p align="center">This is second p element</p>

        <!--Global attribute, class နှင့် id ရှိတယ်။ class ကို အကြိမ်ကြိမ်သုံးလို့ရတယ်။ id ကတော့ တမျိုးကို တစ်ခုပဲ ရှိရမယ်။-->
        <p class="p-tag" id="p-id">stat Web Development with PHP Weekday</p>
        <p class="p-tag">Thiha Kyaw</p>

        <h2>Hello World</h2>
        <p>hello, 
            Welcome
        </p>

        <div>
            <span>
                <p>Hello</p>
            </span>
        </div>

    </body><!--body မှာတော့ user ကို မြင်စေချင်တာတွေ ရေးထားမှာ။ tag နှင့် element ကွဲရမယ်။ ဖော်ပြချက်စာသားပါရင် element-->
</html>
